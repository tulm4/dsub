# golangci-lint configuration for 5G UDM project
# Based on: docs/testing-strategy.md §7 (CI/CD Integration)

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocritic:
    enabled-tags:
      - diagnostic
      - style
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
