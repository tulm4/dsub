# NetworkPolicy for udm-ssau (Service-Specific Authorization)
#
# Based on: docs/security.md §7.2 (Pod-to-Pod Micro-Segmentation)
# 3GPP: TS 29.503 Nudm_SSAU — consumed by NEF
#
# Ingress: NEF pods on port 8443 (SBI)
# Egress:  YugabyteDB on port 5433, NRF on port 8443, DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: udm-ssau
  namespace: udm
  labels:
    app.kubernetes.io/part-of: udm
    app.kubernetes.io/component: ssau
spec:
  podSelector:
    matchLabels:
      app: udm-ssau
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: nef
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: data
          podSelector:
            matchLabels:
              app: yugabytedb
      ports:
        - protocol: TCP
          port: 5433
    - to:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: nrf
      ports:
        - protocol: TCP
          port: 8443
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
