# NetworkPolicy for udm-sdm (Subscriber Data Management)
#
# Based on: docs/security.md §7.2 (Pod-to-Pod Micro-Segmentation)
# 3GPP: TS 29.503 Nudm_SDM — consumed by AMF, SMF, SMSF
#
# Ingress: AMF, SMF, SMSF pods on port 8443 (SBI)
# Egress:  YugabyteDB on port 5433, NRF on port 8443, DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: udm-sdm
  namespace: udm
  labels:
    app.kubernetes.io/part-of: udm
    app.kubernetes.io/component: sdm
spec:
  podSelector:
    matchLabels:
      app: udm-sdm
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: amf
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: smf
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: smsf
      ports:
        - protocol: TCP
          port: 8443
  egress:
    # YugabyteDB (YSQL)
    - to:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: data
          podSelector:
            matchLabels:
              app: yugabytedb
      ports:
        - protocol: TCP
          port: 5433
    # NRF
    - to:
        - namespaceSelector:
            matchLabels:
              network.kubernetes.io/plane: signaling
          podSelector:
            matchLabels:
              app: nrf
      ports:
        - protocol: TCP
          port: 8443
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
